services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092" # Порт для подключения с хост-машины (Rider/localhost)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      
      # Настраиваем два listener'а: один для docker-сети, второй для хоста
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      
      # ВКЛЮЧАЕМ АВТО-СОЗДАНИЕ ТОПИКОВ (решает проблему отсутствия топиков)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - order-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - order-net
    depends_on:
      - kafka

  keycloak-db:
    image: postgres:18-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - order-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: 
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:${KEYCLOAK_DB_PORT}/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT}
      KC_HTTP_ENABLED: ${KEYCLOAK_HTTP_ENABLED}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ../../infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/marketplace-realm.json:ro
    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - order-net

  keycloak-init:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ../../infrastructure/keycloak/init-users.sh:/tmp/init-users.sh:ro
    entrypoint: ["/bin/bash", "/tmp/init-users.sh"]
    environment:
      KC_ADMIN: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_SERVER_URL: http://keycloak:8080
      KC_REALM: marketplace
      TEST_USER_EMAIL: ${TEST_USER_EMAIL:-test@example.com}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-password}
      ADMIN_USER_EMAIL: ${ADMIN_USER_EMAIL:-admin@example.com}
      ADMIN_USER_PASSWORD: ${ADMIN_USER_PASSWORD:-admin123}
    networks:
      - order-net
    restart: "no"

  order-db:
    image: postgres:18-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
    ports:
      - "5433:5432"  
    volumes:
      - order_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d orders"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - order-net

  orderservice.http:
    image: ${DOCKER_REGISTRY-}orderservicehttp
    build:
      context: .
      dockerfile: OrderService.Http/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: Host=order-db;Port=5432;Database=orders;Username=order_user;Password=order_password;Pooling=true;Maximum Pool Size=100;Minimum Pool Size=10;Timeout=30;Command Timeout=30;
      
      KafkaSettings__Servers: kafka:9092
      
      Keycloak__Authority: http://keycloak:8080/realms/marketplace
      Keycloak__Audience: marketplace-app
      Keycloak__RequireHttpsMetadata: "false"
      
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - order-net


volumes:
  kafka-data:
  keycloak_data:
  order_data: 

networks:
  order-net:
    driver: bridge
