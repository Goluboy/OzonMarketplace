services:
  product-service:
    restart: 
      always
    build:
      context: ./backend
      dockerfile: ProductService/Dockerfile
    container_name: product-service
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__PostgresConnectionString: Host=postgres;Port=5432;Database=marketplace;Username=dev;Password=dev;Pooling=true;Maximum Pool Size=100;Minimum Pool Size=10;Timeout=30;Command Timeout=30;
      KafkaSettings__Servers: kafka:9092
      ASPNETCORE_ENVIRONMENT: Development

      Minio__Endpoint: http://minio:9000
      Minio__ExternalEndpoint: http://localhost:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Minio__BucketName: marketplace-bucket
      Minio__UseHttp: true
    depends_on:
      - postgres
      - kafka
      - minio
    networks:
      - app-net

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/var/lib/minio/data
    networks:
      - app-net

  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    entrypoint: |
      /bin/sh -c "
      echo 'Ожидание запуска MinIO...';
      until /usr/bin/mc alias set localminio http://minio:9000 minioadmin minioadmin > /dev/null 2>&1; do
        echo 'MinIO еще не готов, повторная попытка через 2 секунды...';
        sleep 2;
      done;
      echo 'Соединение установлено. Настройка бакета...';
      if ! /usr/bin/mc ls localminio/marketplace-bucket > /dev/null 2>&1; then
        /usr/bin/mc mb localminio/marketplace-bucket;
        /usr/bin/mc anonymous set download localminio/marketplace-bucket;
        echo 'Бакет marketplace-bucket успешно создан.';
      else
        echo 'Бакет уже существует.';
      fi;
      /usr/bin/mc anonymous set download localminio/marketplace-bucket;
      echo 'Публичный доступ (download) успешно применен к бакету.';
      exit 0;
      "
    networks:
      - app-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092" # Порт для подключения с хост-машины (Rider/localhost)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      
      # Настраиваем два listener'а: один для docker-сети, второй для хоста
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      
      # ВКЛЮЧАЕМ АВТО-СОЗДАНИЕ ТОПИКОВ (решает проблему отсутствия топиков)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - app-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - app-net
    depends_on:
      - kafka

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - app-net

volumes:
  kafka-data:
  postgres-data:
  minio-data:

networks:
  app-net:
    driver: bridge