bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 1024
timeout 0
tcp-keepalive 300
requirepass redispassword

maxmemory 1gb

maxmemory-policy allkeys-lru
maxmemory-samples 5

databases 1

save ""

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

loglevel notice