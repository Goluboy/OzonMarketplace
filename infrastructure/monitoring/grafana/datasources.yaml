apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus # ЖЕСТКО ЗАДАЕМ UID для связи с дашбордами
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "15s" # Рекомендуемый интервал скрейпинга

  - name: Loki
    type: loki
    uid: loki # ЖЕСТКО ЗАДАЕМ UID
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        # Паттерн для Quarkus / OTLP (snake_case)
        - datasourceUid: jaeger
          matcherRegex: '"trace_id":"([a-f0-9A-F]{32})"'
          name: TraceID
          url: '${__value.raw}'
        # Паттерн для .NET Serilog (PascalCase)
        - datasourceUid: jaeger
          matcherRegex: '"TraceId":"([a-f0-9A-F]{32})"'
          name: TraceID
          url: '${__value.raw}'

  - name: Jaeger
    type: jaeger
    uid: jaeger # Этот UID используется в derivedFields у Loki
    access: proxy
    url: http://jaeger:16686
    jsonData:
      # Bidirectional Drilldown: Переход из Трейса (Jaeger) в Логи (Loki)
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        tags: ['job'] # Loki будет фильтровать логи по лейблу job, если он совпадает с сервисом