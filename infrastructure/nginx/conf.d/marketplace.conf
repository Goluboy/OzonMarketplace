# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m      rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m     rate=5r/s;
limit_req_zone $binary_remote_addr zone=monitoring:10m rate=20r/s;

server {
    listen 80;
    server_name localhost;

    include /etc/nginx/snippets/security-headers.conf;

    # ============================================
    # Корневой путь — пока без frontend (заглушка)
    # ============================================
    location = / {
        return 200 'Marketplace API Gateway is running. Available paths: /api/orders, /api/products, /auth, /monitoring';
        add_header Content-Type text/plain;
    }

    # ============================================
    # Health check
    # ============================================
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # Order Service: /api/orders/*
    # ============================================
    location /api/orders/ {
        limit_req zone=api burst=20 nodelay;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Length'               0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://order_service;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ============================================
    # Product Service: /api/products/*
    # ============================================
    location /api/products/ {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Length'               0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://product_service;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /api/categories/ {
        limit_req zone=api burst=20 nodelay;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Length'               0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://product_service;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ============================================
    # Keycloak: /auth/*
    # ============================================
    location /auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://keycloak/;
        include /etc/nginx/snippets/proxy-params.conf;

        # Keycloak-специфичные заголовки
        proxy_set_header X-Forwarded-Prefix /auth;

        # Увеличенные буферы для больших JWT
        proxy_buffer_size        128k;
        proxy_buffers            4 256k;
        proxy_busy_buffers_size  256k;
    }

    # ============================================
    # Grafana: /monitoring/*
    # ============================================
    location /monitoring/ {
        limit_req zone=monitoring burst=10 nodelay;

        rewrite ^/monitoring/(.*)$ /$1 break;
        proxy_pass http://grafana;
        include /etc/nginx/snippets/proxy-params.conf;

        # WebSocket для Grafana live updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================
    # Kafka UI: /kafka/*
    # ============================================
    location /kafka/ {
        rewrite ^/kafka/(.*)$ /$1 break;
        proxy_pass http://kafka_ui;
        include /etc/nginx/snippets/proxy-params.conf;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================
    # MinIO API: /storage/*
    # ============================================
    location /storage/ {
        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass http://minio_api;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ============================================
    # MinIO Console: /minio/*
    # ============================================
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://minio_console;
        include /etc/nginx/snippets/proxy-params.conf;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================
    # Error pages
    # ============================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}