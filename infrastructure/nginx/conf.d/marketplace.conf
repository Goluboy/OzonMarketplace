server {
    listen 80;
    server_name _;

    # ============================================
    # Docker Embedded DNS — для динамического резолвинга upstream'ов
    # ============================================
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers (defense in depth)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ============================================
    # Health check
    # ============================================
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # Order Service: /api/orders/*
    # ============================================
    location /api/orders/ {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        rewrite ^/api/orders/(.*)$ /$1 break;
        set $upstream_order "http://order-service:8080";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_order;
    }

    # ============================================
    # Product Service: /api/products/*
    # ============================================
    location /api/products/ {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        rewrite ^/api/products/(.*)$ /$1 break;
        set $upstream_product "http://product-service:8080";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_product;
    }

    # ============================================
    # Product Service: /api/categories/*
    # ============================================
    location /api/categories/ {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        rewrite ^/api/categories/(.*)$ /$1 break;
        set $upstream_product "http://product-service:8080";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_product;
    }

    # ============================================
    # Keycloak: /auth/*
    # ============================================
    location = /auth {
        return 301 /auth/admin/;
    }

    location /auth/ {
        limit_req zone=auth burst=300 nodelay;

        set $upstream_keycloak "http://keycloak:8080";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_keycloak;

        # Увеличенные буферы для больших JWT
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ============================================
    # Grafana: /monitoring/*
    # ============================================
    location /monitoring/ {
        limit_req zone=monitoring burst=10 nodelay;

        rewrite ^/monitoring/(.*)$ /$1 break;
        set $upstream_grafana "http://grafana:3000";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_pass $upstream_grafana;
    }

    # ============================================
    # Kafka UI: /kafka/*
    # ============================================
    location /kafka/ {
        rewrite ^/kafka/(.*)$ /$1 break;
        set $upstream_kafka_ui "http://kafka-ui:8080";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_pass $upstream_kafka_ui;
    }

    # ============================================
    # MinIO API: /storage/*
    # ============================================
    location /storage/ {
        rewrite ^/storage/(.*)$ /$1 break;
        set $upstream_minio_api "http://minio:9000";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_minio_api;
    }

    # ============================================
    # MinIO Console: /minio/*
    # ============================================
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        set $upstream_minio_console "http://minio:9001";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_pass $upstream_minio_console;
    }

    # ============================================
    # Redis Insight: /redis-insight/*
    # ============================================
    location /redis-insight/ {
        rewrite ^/redis-insight/(.*)$ /$1 break;
        set $upstream_redis_insight "http://redis-insight:5540";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_redis_insight;
    }

    # ============================================
    # Error pages
    # ============================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ============================================
    # Frontend (Next.js) - КОРНЕВОЙ ПУТЬ
    # ============================================
    location / {
        limit_req zone=frontend burst=50 nodelay;

        set $upstream_frontend "http://frontend:3000";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_pass $upstream_frontend;
    }

    # Next.js статика (кэш на 1 год)
    location /_next/static/ {
        set $upstream_frontend "http://frontend:3000";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_frontend;
        
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js image optimization
    location /_next/image {
        set $upstream_frontend "http://frontend:3000";
        
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_frontend;
        
        expires 1d;
        add_header Cache-Control "public";
    }
}