server {
    listen 80;
    server_name _;
    underscores_in_headers on;
    # Docker Embedded DNS
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Health check
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # УДАЛЕНЫ БЛОКИ return 308! 
    # Они создавали бесконечный цикл с Yandex API Gateway.
    # ============================================

    # ============================================
    # 1. API Services (Orders, Products, Categories)
    # Убраны слэши в location, исправлены кавычки для CORS
    # ============================================
    
    # Order Service
    location /api/orders {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        set $upstream_order "http://order-service:8080";
        include /etc/nginx/snippets/proxy-params.conf;
        
        # Явный проброс заголовков от API Gateway
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;

        proxy_pass $upstream_order;
    }

    location /api/admin/orders {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        set $upstream_order "http://order-service:8080";
        include /etc/nginx/snippets/proxy-params.conf;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;

        proxy_pass $upstream_order;
    }

    # Product Service
    location /api/products {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        set $upstream_product "http://product-service:8080";
        include /etc/nginx/snippets/proxy-params.conf;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;

        proxy_pass $upstream_product;
    }

    # Category Service
    location /api/categories {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        set $upstream_product "http://product-service:8080";
        include /etc/nginx/snippets/proxy-params.conf;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;

        proxy_pass $upstream_product;
    }

    # ============================================
    # 2. Keycloak (Auth)
    # Удален location = /auth (ломал OIDC flow)
    # ============================================
    location /auth {
        limit_req zone=auth burst=300 nodelay;

        set $upstream_keycloak "http://keycloak:8080";
        include /etc/nginx/snippets/proxy-params.conf;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
        
        proxy_pass $upstream_keycloak;

        # Увеличенные буферы для больших JWT
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ============================================
    # 3. Monitoring & Tools (Jaeger, Grafana, Kafka, MinIO, Redis)
    # ============================================
    location /jaeger/ {
        limit_req zone=monitoring burst=300 nodelay;
        set $upstream_jaeger "http://jaeger:16686";
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_jaeger;
    }

    location /monitoring/ {
        limit_req zone=monitoring burst=300 nodelay;
        set $upstream_grafana "http://grafana:3000";
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass $upstream_grafana;
    }

    location /kafka/ {
        set $upstream_kafka_ui "http://kafka-ui:8080";
        rewrite ^/kafka/(.*)$ /$1 break;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass $upstream_kafka_ui;
    }

    location /storage/ {
        set $upstream_minio_api "http://minio:9000";
        rewrite ^/storage/(.*)$ /$1 break;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_minio_api;
    }

    location /minio/ {
        set $upstream_minio_console "http://minio:9001";
        rewrite ^/minio/(.*)$ /$1 break;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass $upstream_minio_console;
    }

    location /redis-insight/ {
        set $upstream_redis_insight "http://redis-insight:5540";
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass $upstream_redis_insight;
    }

    # ============================================
    # 4. Frontend (Next.js) - КРИТИЧЕСКИ ВАЖНО
    # Добавлен проброс X-Forwarded-Proto для решения Mixed Content
    # ============================================
    location / {
        limit_req zone=frontend burst=50 nodelay;

        set $upstream_frontend "http://frontend:3000";
        include /etc/nginx/snippets/proxy-params.conf;
        
        # Без этих заголовков Next.js генерирует http:// ссылки!
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_pass $upstream_frontend;
    }

    # Next.js статика
    location /_next/static/ {
        set $upstream_frontend "http://frontend:3000";
        include /etc/nginx/snippets/proxy-params.conf;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        
        proxy_pass $upstream_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js image optimization
    location /_next/image {
        set $upstream_frontend "http://frontend:3000";
        include /etc/nginx/snippets/proxy-params.conf;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        
        proxy_pass $upstream_frontend;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
