# Заголовки для бэкенда

# Host и Real IP
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;

# Цепочка IP-адресов (клиент → хостинг → Docker Nginx)
# $proxy_add_x_forwarded_for добавляет IP Docker Nginx к существующей цепочке
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

# КРИТИЧНО: Передаем информацию о протоколе от хостинга
# Если внешний прокси передал X-Forwarded-Proto, используем его
# Иначе считаем, что всегда HTTPS (так как хостинг терминирует SSL)
proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
proxy_set_header X-Forwarded-Host $http_x_forwarded_host;

# HTTP настройки
proxy_http_version 1.1;
proxy_set_header Connection "";

proxy_connect_timeout 60s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;
