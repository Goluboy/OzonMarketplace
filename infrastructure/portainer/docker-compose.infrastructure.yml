services:
  nginx:
    image: goluboy/marketplace-nginx:latest
    container_name: nginx-gateway
    restart: unless-stopped
    volumes:
      - nginx-logs:/var/log/nginx
    networks:
      - traefik_proxy
      - app-netu
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3    
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"        
        - "traefik.http.routers.marketplace-nginx.rule=Host(`netu.highload-study.ru`)"
        - "traefik.http.routers.marketplace-nginx.entrypoints=websecure"
        - "traefik.http.routers.marketplace-nginx.tls=true"
        - "traefik.http.routers.marketplace-nginx.tls.certresolver=letresolver"
        - "traefik.http.services.marketplace-nginx.loadbalancer.server.port=80"

  keycloak-db:
    image: postgres:18-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_data:/var/lib/postgresql
    networks:
      - app-netu
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    shm_size: '256mb'

  keycloak:
    image: goluboy/marketplace-keycloak:latest
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:${KEYCLOAK_DB_PORT}/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-false}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: ${KEYCLOAK_HTTP_ENABLED:-true}
      KC_HEALTH_ENABLED: "true"
      
      KC_FEATURES: "opentelemetry"
      KC_METRICS_ENABLED: "true"
      KC_TRACING_ENABLED: "true"
      KC_TRACING_ENDPOINT: ${TRACING_ENDPOINT}
        
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s
    depends_on:
      - keycloak-db
    networks:
      - app-netu

  keycloak-init:
    image: goluboy/marketplace-keycloak:latest
    container_name: keycloak-init
    depends_on:
      - keycloak
        
    entrypoint: ["/bin/bash", "/tmp/init-users.sh"]
    environment:
      KC_ADMIN: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_SERVER_URL: http://keycloak:8080/auth
      KC_REALM: marketplace
      TEST_USER_EMAIL: ${TEST_USER_EMAIL:-test@example.com}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-password}
      ADMIN_USER_EMAIL: ${ADMIN_USER_EMAIL:-admin@example.com}
      ADMIN_USER_PASSWORD: ${ADMIN_USER_PASSWORD:-admin123}
    networks:
      - app-netu
    restart: "no"

  prometheus:
    image: goluboy/marketplace-prometheus:latest
    container_name: prometheus
    volumes:
      - prometheus-data:/prometheus
    networks:
      - app-netu
    restart: always

  loki:
    image: goluboy/marketplace-loki:latest
    container_name: loki
    networks:
      - app-netu
    restart: always

  grafana:
    image: goluboy/marketplace-grafana:latest
    container_name: grafana
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - app-netu
    restart: always

  grafana-init:
    image: goluboy/marketplace-grafana-init:latest
    environment:
      GRAFANA_URL: http://marketplace-infrastructure_grafana:3000
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      - grafana
    networks:
      - app-netu
    deploy:
      restart_policy:
        condition: none

  jaeger:
    image: jaegertracing/all-in-one:latest
    networks:
      - app-netu
    deploy:
      restart_policy:
        condition: any

volumes:
  keycloak_data:
  prometheus-data:
  grafana-data:
  nginx-logs:

networks:
  traefik_proxy:
    external: true
  app-netu:
    driver: overlay
    attachable: true 