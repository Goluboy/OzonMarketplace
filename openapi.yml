openapi: 3.0.3
info:
  title: Marketplace API
  description: >-
    Упрощенная система маркетплейса. Включает сервис продуктов и сервис заказов.
    Реализовано на стеке: ASP.NET Core, Dapper, PostgreSQL.
    Все идентификаторы используют формат UUID (Guid).
    Для защищенных эндпоинтов требуется JWT токен в заголовке Authorization.
  version: 1.0.0
  contact:
    name: Команда разработки
    email: team@marketplace.local
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000
    description: Локальный сервер разработки
  - url: https://api.marketplace.example.com
    description: Продакшен-сервер

tags:
  - name: Auth
    description: Аутентификация и управление сессиями
  - name: Categories
    description: Управление категориями товаров (Сервис категорий)
  - name: Products
    description: Операции с каталогом товаров
  - name: Pricing
    description: Управление акционными ценами и скидками (Сервис цен)
  - name: Orders
    description: Управление заказами и их статусами

security:
  - JwtBearer: []

paths:
  # === Auth ===
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Аутентификация пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "user@example.com"
              password: "SecurePass123!"
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                user:
                  id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  email: "user@example.com"
                  role: "customer"
        '401':
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Регистрация нового пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Ошибка валидации или пользователь уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  # === Categories ===
  /api/categories:
    get:
      tags:
        - Categories
      summary: Получение всего списка категорий
      description: >-
        Возвращает список всех категорий. Поддерживает оптимизацию кэширования на стороне клиента 
        с помощью ETag. При повторных запросах передавайте полученный ETag в заголовке `If-None-Match`.
      security: []
      parameters:
        - in: header
          name: If-None-Match
          required: false
          schema:
            type: string
          description: Значение ETag, полученное при предыдущем успешном запросе.
      responses:
        '200':
          description: Список категорий успешно получен (данные изменились)
          headers:
            ETag:
              schema:
                type: string
              description: Уникальный хэш текущей версии списка категорий (например, "W/\"3a1f9e2b\"").
            Cache-Control:
              schema:
                type: string
                example: "no-cache"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryDto'
        '304':
          description: Данные не изменились. Клиент должен использовать свою локальную копию.
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
                example: "no-cache"
        '500':
          description: Внутренняя ошибка сервера
    
    post:
      tags:
        - Categories
      summary: Создание новой категории (только администратор)
      security:
        - JwtBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Категория успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDto'
        '400':
          description: Ошибка валидации данных
        '401':
          description: Неавторизован
        '403':
          description: Доступ запрещен
  
  /api/categories/{id}:
    put:
      tags:
        - Categories
      summary: Обновление категории (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Уникальный идентификатор категории (int)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Категория обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDto'
        '400':
          description: Ошибка валидации
        '401':
          description: Неавторизован
        '403':
          description: Доступ запрещен
        '404':
          description: Категория не найдена

    delete:
      tags:
        - Categories
      summary: Удаление категории (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Уникальный идентификатор категории (int)
      responses:
        '204':
          description: Категория удалена
        '401':
          description: Неавторизован
        '403':
          description: Доступ запрещен
        '404':
          description: Категория не найдена

  # === Products ===
  /api/products:
    get:
      tags:
        - Products
      summary: Поиск и фильтрация товаров
      description: Возвращает пагинированный список товаров с поддержкой фильтрации, сортировки и поиска.
      security: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Поисковый запрос по названию или описанию
        - in: query
          name: categoryId
          schema:
            type: integer
          description: Фильтр по числовому идентификатору категории
        - in: query
          name: minPrice
          schema:
            $ref: '#/components/schemas/Money'
        - in: query
          name: maxPrice
          schema:
            $ref: '#/components/schemas/Money'
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name, price, createdAt]
            default: createdAt
          description: Поле для сортировки
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Порядок сортировки
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Номер страницы (начинается с 1)
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Количество элементов на странице
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPagedResult'
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

    post:
      tags:
        - Products
      summary: Создание нового товара (только администратор)
      security:
        - JwtBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Товар создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDto'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Неавторизован
        '403':
          description: Недостаточно прав

  /api/products/{id}:
    get:
      tags:
        - Products
      summary: Получение деталей товара
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Уникальный идентификатор товара (UUID)
      responses:
        '200':
          description: Детали товара
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDto'
        '404':
          description: Товар не найден
        '400':
          description: Неверный формат UUID

    put:
      tags:
        - Products
      summary: Обновление товара (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Товар обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDto'
        '400':
          description: Ошибка валидации
        '401':
          description: Неавторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Товар не найден

    delete:
      tags:
        - Products
      summary: Удаление товара (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Товар удален
        '401':
          description: Неавторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Товар не найден

  # === Pricing (Discounts Service) ===
  /api/pricing/products/{productId}:
    get:
      tags:
        - Pricing
      summary: Получение информации о скидке на товар (для админки)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
            format: uuid
          description: Уникальный идентификатор товара (UUID)
      responses:
        '200':
          description: Информация о скидке получена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDiscountDto'
        '401':
          description: Неавторизован
        '403':
          description: Доступ запрещен
        '404':
          description: Скидка для данного товара еще не создавалась

    post:
      tags:
        - Pricing
      summary: Создание/установка скидочной цены на товар (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDiscountRequest'
      responses:
        '201':
          description: Скидочная цена успешно установлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDiscountDto'
        '400':
          description: Ошибка валидации
        '404':
          description: Товар не найден

    put:
      tags:
        - Pricing
      summary: Обновление параметров скидки (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDiscountRequest'
      responses:
        '200':
          description: Параметры скидки успешно изменены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDiscountDto'
        '404':
          description: Настройка скидки для товара не найдена

  /api/pricing/products/{productId}/activate:
    post:
      tags:
        - Pricing
      summary: Активация скидки (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Скидка успешно активирована
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDiscountDto'
        '404':
          description: Настройка скидки не найдена

  /api/pricing/products/{productId}/deactivate:
    post:
      tags:
        - Pricing
      summary: Деактивация скидки (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Скидка деактивирована (товар будет продаваться по базовой цене)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDiscountDto'
        '404':
          description: Настройка скидки не найдена

  # === Orders ===
  /api/orders:
    get:
      tags:
        - Orders
      summary: Получение списка заказов текущего пользователя
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Номер страницы (начинается с 1)
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Количество элементов на странице
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OrderStatus'
          description: Фильтр по статусу заказа
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPagedResult'
        '401':
          description: Неавторизован

    post:
      tags:
        - Orders
      summary: Оформление нового заказа
      description: Создает заказ на основе переданного списка товаров из корзины клиента.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              customerName: "Иван Иванов"
              customerEmail: "ivan@example.com"
              deliveryAddress: "г. Екатеринбург, ул. Ленина, 1"
              items:
                - productId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  quantity: 2
      responses:
        '202':
          description: Заказ принят в обработку (асинхронно)
          content:
            application/json:
              schema:
                type: object
                required: [orderId, statusCheckUrl]
                properties:
                  orderId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [Draft, Processing]
                    default: Draft
                  statusCheckUrl:
                    type: string
                    format: uri
                    example: "/api/orders/{orderId}/status"
        '400':
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Неавторизован
        '409':
          description: Конфликт (товар недоступен)

  /api/orders/{id}:
    get:
      tags:
        - Orders
      summary: Получение информации о заказе
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Информация о заказе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '401':
          description: Неавторизован
        '403':
          description: Доступ запрещен (заказ принадлежит другому пользователю)
        '404':
          description: Заказ не найден

    delete:
      tags:
        - Orders
      summary: Отмена заказа пользователем
      description: Позволяет пользователю отменить свой заказ, если он ещё не перешёл в статус "Собирается".
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Заказ отменен
        '400':
          description: Нельзя отменить заказ в текущем статусе
        '401':
          description: Неавторизован
        '403':
          description: Доступ запрещен
        '404':
          description: Заказ не найден

    put:
      tags:
        - Orders
      summary: Обновление статуса заказа (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Статус обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '400':
          description: Недопустимый переход статуса
        '401':
          description: Неавторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Заказ не найден

  /api/orders/{id}/status:
    get:
      summary: Проверка статуса обработки заказа (для SAGA)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Текущий статус обработки
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { $ref: '#/components/schemas/OrderStatus' }
                  message: 
                    type: string
                    example: "Waiting for stock reservation..."
                  updatedAt: { type: string, format: date-time }

components:
  securitySchemes:
    JwtBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Введите JWT токен без префикса "Bearer ".
        Пример: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

  schemas:
    # === Auth ===
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          minLength: 8
          example: "SecurePass123!"

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        name:
          type: string
          minLength: 2
          example: "Иван Иванов"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT токен для авторизации последующих запросов
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            role:
              type: string
              enum: [customer, admin]

    # === Categories ===
    CategoryDto:
      type: object
      required:
        - id
        - name
        - path
      properties:
        id:
          type: integer
          example: 15
          readOnly: true
        name:
          type: string
          example: "Смартфоны"
        path:
          type: string
          example: "electronics.phones.smartphones"

    CreateCategoryRequest:
      type: object
      required:
        - name
        - path
      properties:
        name:
          type: string
          example: "Электроника"
        path:
          type: string
          example: "electronics"

    UpdateCategoryRequest:
      type: object
      required:
        - name
        - path
      properties:
        name:
          type: string
          example: "Бытовая техника"
        path:
          type: string
          example: "appliances"

    # === Products ===
    
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: string
          pattern: '^\d+\.\d{2}$'
          example: "1299.99"
          description: Сумма в формате строки для сохранения точности (2 знака после запятой)
        currency:
          type: string
          enum: [USD, EUR, RUB]
          default: RUB
          example: "RUB"
          description: Код валюты по ISO 4217

    ProductImage:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          example: "https://cdn.example.com/product.jpg"

    ProductDto:
      type: object
      required:
        - id
        - sku
        - sellerId
        - name
        - description
        - price
        - categoryId
        - images
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        sku:
          type: integer
          example: 1001
        sellerId:
          type: string
          format: uuid
          readOnly: true
          description: Уникальный идентификатор продавца-владельца товара (UUID)
          example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: "Ноутбук игровой"
        description:
          type: string
          maxLength: 2000
          example: "Мощный игровой ноутбук с видеокартой RTX"
        price:
          $ref: '#/components/schemas/Money'
        categoryId:
          type: integer
          example: 15
        categoryName:
          type: string
          readOnly: true
          example: "Смартфоны"
          description: Человекочитаемое название категории для отображения (только чтение)
        categoryPath:
          type: string
          readOnly: true
          example: "electronics.phones.smartphones"
          description: Полный иерархический путь категории для хлебных крошек (только чтение)
        images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true

    CreateProductRequest:
      type: object
      required:
        - sku
        - name
        - description
        - price
        - categoryId
        - images
      properties:
        sku:
          type: integer
          example: 1001
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: "Ноутбук"
        description:
          type: string
          maxLength: 2000
          example: "Описание товара"
        price:
          $ref: '#/components/schemas/Money'
        categoryId:
          type: integer
          example: 15
        images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        price:
          $ref: '#/components/schemas/Money'
        categoryId:
          type: integer
        images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'

    ProductPagedResult:
      type: object
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductDto'
        totalCount:
          type: integer
          minimum: 0
          example: 150
        page:
          type: integer
          minimum: 1
          example: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
          example: 20

    # === Pricing / Discounts ===
    
    SetDiscountRequest:
      type: object
      required:
        - salePrice
      properties:
        salePrice:
          $ref: '#/components/schemas/Money'

    ProductDiscountDto:
      type: object
      required:
        - productId
        - sellerId
        - salePrice
        - isActive
      properties:
        productId:
          type: string
          format: uuid
          readOnly: true
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        sellerId:
          type: string
          format: uuid
          readOnly: true
          description: Уникальный идентификатор продавца-владельца товара (UUID)
          example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
        salePrice:
          $ref: '#/components/schemas/Money'
        isActive:
          type: boolean
          example: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    # === Orders ===
    CreateOrderRequest:
      type: object
      required:
        - items
        - customerName
        - customerEmail
      properties:
        customerName:
          type: string
          minLength: 2
          maxLength: 100
          example: "Иван Иванов"
        customerEmail:
          type: string
          format: email
          example: "ivan@example.com"
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/OrderItemCreate'
        deliveryAddress:
          type: string
          maxLength: 500
          nullable: true
          example: "г. Екатеринбург, ул. Ленина, 1, кв. 42"

    OrderItemCreate:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: string
          format: uuid
          description: Уникальный идентификатор товара (UUID)
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        quantity:
          type: integer
          minimum: 1
          maximum: 99
          example: 2

    OrderDto:
      type: object
      required:
        - id
        - status
        - createdAt
        - totalAmount
        - items
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
        status:
          $ref: '#/components/schemas/OrderStatus'
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        customerName:
          type: string
          readOnly: true
        customerEmail:
          type: string
          format: email
          readOnly: true
        deliveryAddress:
          type: string
          readOnly: true
          nullable: true
        totalAmount:
          $ref: '#/components/schemas/Money'
          readOnly: true
          description: Итоговая сумма заказа
        items:
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/OrderItemDto'

    OrderItemDto:
      type: object
      required:
        - productId
        - productName
        - quantity
        - priceAtPurchase
      properties:
        productId:
          type: string
          format: uuid
          readOnly: true
        productName:
          type: string
          readOnly: true
        quantity:
          type: integer
          readOnly: true
          minimum: 1
        priceAtPurchase:
          $ref: '#/components/schemas/Money'
          readOnly: true
          description: Цена товара на момент покупки

    OrderPagedResult:
      type: object
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderDto'
        totalCount:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100

    UpdateOrderStatusRequest:
      type: object
      required:
        - newStatus
      properties:
        newStatus:
          $ref: '#/components/schemas/OrderStatus'
        comment:
          type: string
          maxLength: 500
          nullable: true
          description: Комментарий к смене статуса (опционально)

    OrderStatus:
      type: string
      enum:
        - Created
        - Paid
        - Assembling
        - Shipping
        - Delivered
        - Cancelled
      description: Жизненный цикл заказа

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          format: uri
          example: "https://httpstatuses.com/400"
        title:
          type: string
          example: "One or more validation errors occurred."
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 400
        detail:
          type: string
          nullable: true
          example: "The field 'email' must be a valid email address."
        instance:
          type: string
          format: uri
          nullable: true
          example: "/api/orders"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["Неверный формат email", "Email уже зарегистрирован"]