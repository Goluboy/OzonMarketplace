openapi: 3.0.3
info:
  title: Marketplace API
  description: >-
    Упрощенная система маркетплейса. Включает сервис продуктов и сервис заказов.
    Реализовано на стеке: ASP.NET Core, Dapper, PostgreSQL.
    Все идентификаторы используют формат UUID (Guid).
    Для защищенных эндпоинтов требуется JWT токен в заголовке Authorization.
  version: 1.0.0
  contact:
    name: Команда разработки
    email: team@marketplace.local
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000
    description: Локальный сервер разработки
  - url: https://api.marketplace.example.com
    description: Продакшен-сервер

tags:
  - name: Auth
    description: Аутентификация и управление сессиями
  - name: Products
    description: Операции с каталогом товаров
  - name: Orders
    description: Управление заказами и их статусами

# Глобальная схема безопасности
security:
  - JwtBearer: []

paths:
  # === Auth ===
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Аутентификация пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "user@example.com"
              password: "SecurePass123!"
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                user:
                  id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  email: "user@example.com"
                  role: "customer"
        '401':
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Регистрация нового пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Ошибка валидации или пользователь уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  # === Products ===
  /api/products:
    get:
      tags:
        - Products
      summary: Поиск и фильтрация товаров
      description: Возвращает пагинированный список товаров с поддержкой фильтрации, сортировки и поиска.
      security: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Поисковый запрос по названию или описанию
        - in: query
          name: category
          schema:
            type: string
          description: Фильтр по категории товара
        - in: query
          name: minPrice
          schema:
            type: number
            format: float
            minimum: 0
          description: Минимальная цена
        - in: query
          name: maxPrice
          schema:
            type: number
            format: float
            minimum: 0
          description: Максимальная цена
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name, price, createdAt]
            default: createdAt
          description: Поле для сортировки
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Порядок сортировки
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Номер страницы (начинается с 1)
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Количество элементов на странице
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPagedResult'
              example:
                items:
                  - id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    name: "Ноутбук"
                    price: 99999.99
                totalCount: 150
                page: 1
                pageSize: 20
        '400':
          description: Неверные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

    post:
      tags:
        - Products
      summary: Создание нового товара (только администратор)
      security:
        - JwtBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Товар создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDto'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Неавторизован
        '403':
          description: Недостаточно прав

  /api/products/{id}:
    get:
      tags:
        - Products
      summary: Получение деталей товара
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Уникальный идентификатор товара (UUID)
      responses:
        '200':
          description: Детали товара
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDto'
        '404':
          description: Товар не найден
        '400':
          description: Неверный формат UUID

    put:
      tags:
        - Products
      summary: Обновление товара (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Товар обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDto'
        '400':
          description: Ошибка валидации
        '401':
          description: Неавторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Товар не найден

    delete:
      tags:
        - Products
      summary: Удаление товара (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Товар удален
        '401':
          description: Неавторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Товар не найден

  # === Orders ===
  /api/orders:
    get:
      tags:
        - Orders
      summary: Получение списка заказов текущего пользователя
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OrderStatus'
          description: Фильтр по статусу заказа
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPagedResult'
        '401':
          description: Неавторизован

    post:
      tags:
        - Orders
      summary: Оформление нового заказа
      description: Создает заказ на основе переданного списка товаров из корзины клиента.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              customerName: "Иван Иванов"
              customerEmail: "ivan@example.com"
              deliveryAddress: "г. Екатеринбург, ул. Ленина, 1"
              items:
                - productId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  quantity: 2
      responses:
        '201':
          description: Заказ успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
              example:
                id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                status: "Created"
                totalAmount: 199999.98
                items:
                  - productId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    quantity: 2
                    priceAtPurchase: 99999.99
        '400':
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Неавторизован
        '409':
          description: Конфликт (товар недоступен)

  /api/orders/{id}:
    get:
      tags:
        - Orders
      summary: Получение информации о заказе
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Информация о заказе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '401':
          description: Неавторизован
        '403':
          description: Доступ запрещен (заказ принадлежит другому пользователю)
        '404':
          description: Заказ не найден

    delete:
      tags:
        - Orders
      summary: Отмена заказа пользователем
      description: Позволяет пользователю отменить свой заказ, если он ещё не перешёл в статус "Собирается".
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Заказ отменен
        '400':
          description: Нельзя отменить заказ в текущем статусе
        '401':
          description: Неавторизован
        '403':
          description: Доступ запрещен
        '404':
          description: Заказ не найден

    put:
      tags:
        - Orders
      summary: Обновление статуса заказа (только администратор)
      security:
        - JwtBearer: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Статус обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '400':
          description: Недопустимый переход статуса
        '401':
          description: Неавторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Заказ не найден

components:
  securitySchemes:
    JwtBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Введите JWT токен без префикса "Bearer ".
        Пример: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

  schemas:
    # === Auth ===
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          minLength: 8
          example: "SecurePass123!"

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        name:
          type: string
          minLength: 2
          example: "Иван Иванов"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT токен для авторизации последующих запросов
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            role:
              type: string
              enum: [customer, admin]

    # === Products ===
    ProductDto:
      type: object
      required:
        - id
        - name
        - price
        - category
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: "Ноутбук игровой"
        description:
          type: string
          maxLength: 2000
          example: "Мощный игровой ноутбук с видеокартой RTX"
        price:
          type: number
          format: float
          minimum: 0
          example: 99999.99
        category:
          type: string
          example: "Электроника"
        imageUrl:
          type: string
          format: uri
          nullable: true
          example: "https://cdn.example.com/product.jpg"
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true

    CreateProductRequest:
      type: object
      required:
        - name
        - price
        - category
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        price:
          type: number
          format: float
          minimum: 0
        category:
          type: string
        imageUrl:
          type: string
          format: uri
          nullable: true

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        price:
          type: number
          format: float
          minimum: 0
        category:
          type: string
        imageUrl:
          type: string
          format: uri
          nullable: true

    ProductPagedResult:
      type: object
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductDto'
        totalCount:
          type: integer
          minimum: 0
          example: 150
        page:
          type: integer
          minimum: 1
          example: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
          example: 20

    # === Orders ===
    CreateOrderRequest:
      type: object
      required:
        - items
        - customerName
        - customerEmail
      properties:
        customerName:
          type: string
          minLength: 2
          maxLength: 100
          example: "Иван Иванов"
        customerEmail:
          type: string
          format: email
          example: "ivan@example.com"
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/OrderItemCreate'
        deliveryAddress:
          type: string
          maxLength: 500
          nullable: true
          example: "г. Екатеринбург, ул. Ленина, 1, кв. 42"

    OrderItemCreate:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: string
          format: uuid
          description: Уникальный идентификатор товара (UUID)
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        quantity:
          type: integer
          minimum: 1
          maximum: 99
          example: 2

    OrderDto:
      type: object
      required:
        - id
        - status
        - createdAt
        - totalAmount
        - items
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
        status:
          $ref: '#/components/schemas/OrderStatus'
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        customerName:
          type: string
          readOnly: true
        customerEmail:
          type: string
          format: email
          readOnly: true
        deliveryAddress:
          type: string
          readOnly: true
          nullable: true
        totalAmount:
          type: number
          format: float
          readOnly: true
          description: Итоговая сумма заказа
          example: 199999.98
        items:
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/OrderItemDto'

    OrderItemDto:
      type: object
      required:
        - productId
        - productName
        - quantity
        - priceAtPurchase
      properties:
        productId:
          type: string
          format: uuid
          readOnly: true
        productName:
          type: string
          readOnly: true
        quantity:
          type: integer
          readOnly: true
          minimum: 1
        priceAtPurchase:
          type: number
          format: float
          readOnly: true
          description: Цена товара на момент покупки

    OrderPagedResult:
      type: object
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderDto'
        totalCount:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100

    UpdateOrderStatusRequest:
      type: object
      required:
        - newStatus
      properties:
        newStatus:
          $ref: '#/components/schemas/OrderStatus'
        comment:
          type: string
          maxLength: 500
          nullable: true
          description: Комментарий к смене статуса (опционально)

    OrderStatus:
      type: string
      enum:
        - Created
        - Paid
        - Assembling
        - Shipping
        - Delivered
        - Cancelled
      description: Жизненный цикл заказа

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          format: uri
          example: "https://httpstatuses.com/400"
        title:
          type: string
          example: "One or more validation errors occurred."
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 400
        detail:
          type: string
          nullable: true
          example: "The field 'email' must be a valid email address."
        instance:
          type: string
          format: uri
          nullable: true
          example: "/api/orders"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["Неверный формат email", "Email уже зарегистрирован"]